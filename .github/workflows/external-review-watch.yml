name: External Review Watch

on:
  issues:
    types: [opened, edited, reopened]
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  pull-requests: read

concurrency:
  group: external-review-watch-${{ github.event.issue.number || github.run_id }}
  cancel-in-progress: false

jobs:
  triage:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Build event payload
        id: payload
        shell: bash
        run: |
          python3 - <<'PY'
          import json, os

          event_path = os.environ["GITHUB_EVENT_PATH"]
          with open(event_path, "r", encoding="utf-8") as f:
              event = json.load(f)

          event_name = os.environ["GITHUB_EVENT_NAME"]

          issue = event.get("issue", {})
          comment = event.get("comment", {})

          data = {
              "event_name": event_name,
              "action": event.get("action"),
              "repository": event.get("repository", {}).get("full_name"),
              "issue_number": issue.get("number"),
              "issue_title": issue.get("title", ""),
              "issue_body": issue.get("body", ""),
              "issue_labels": [l["name"] for l in issue.get("labels", [])],
              "issue_author": issue.get("user", {}).get("login", ""),
              "comment_body": comment.get("body", ""),
              "comment_author": comment.get("user", {}).get("login", ""),
          }

          with open("triage-input.json", "w", encoding="utf-8") as f:
              json.dump(data, f, indent=2)
          PY

      - name: Ask Gemini for structured triage
        id: gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        shell: bash
        run: |
          cat > prompt.txt <<'EOF'
          You are the external review triage agent for the trust-audit-kernel repository.

          Your job is to WATCH, CLASSIFY, LABEL, and SUMMARIZE.
          You must NOT propose code changes, open pull requests, or suggest implementation plans.
          You must NOT weaken tests, change specs, or convert design questions into fixes.

          Repository policy:
          - Four explicit external review targets:
            1. Crash semantics model
            2. Observability honesty
            3. Multi-process enforcement assumptions
            4. Operator truth under degraded conditions

          Known gaps already exist in the README gap ledger.
          External signal is most valuable when it:
          - references a specific invariant or test ID
          - presents a concrete reproduction path
          - exposes a contradiction between README/spec/tests/code
          - independently surfaces a reserve-topic issue

          Available labels:
          Surface labels:
          - target-crash-semantics
          - target-observability
          - target-multiprocess
          - target-operator-truth

          Signal labels:
          - external-signal
          - specific-invariant
          - reserve-topic-hit
          - gap-ledger-candidate
          - needs-human-review
          - noise
          - duplicate

          Label rules:
          - Apply exactly one target-* label only if the issue/comment clearly attacks one of the four review targets.
          - Apply specific-invariant if a named invariant, suite, or test ID is referenced.
          - Apply reserve-topic-hit if it independently hits a known reserve design question.
          - Apply gap-ledger-candidate if it may justify a new README gap-ledger entry.
          - Apply noise if it lacks evidence, is broad commentary, or is not actionable.
          - Apply duplicate if it is obviously redundant with an existing issue.
          - Apply needs-human-review if architectural judgment is required.

          Response rules:
          Return ONLY valid JSON in this exact shape:

          {
            "surface_attacked": "target-crash-semantics | target-observability | target-multiprocess | target-operator-truth | unclear",
            "signal_type": "specific invariant | contradiction | reproduction | general commentary | duplicate | unclear",
            "evidence_present": "yes | partial | no",
            "labels": ["label1", "label2"],
            "escalation": "needs human review | no immediate action",
            "comment_body": "### Gemini triage\n- Surface attacked: ...\n- Signal type: ...\n- Evidence present: ...\n- Immediate label recommendation: ...\n- Escalation: ..."
          }

          Keep the tone neutral and concise.
          Do not argue with the reporter.
          Do not claim the issue is valid unless the evidence is concrete.
          Do not promise fixes.

          Event payload follows.
          EOF

          python3 - <<'PY'
          import json

          with open("prompt.txt", "r", encoding="utf-8") as f:
              prompt = f.read()

          with open("triage-input.json", "r", encoding="utf-8") as f:
              payload = json.load(f)

          req = {
              "contents": [
                  {
                      "parts": [
                          {
                              "text": prompt + "\n\n" + json.dumps(payload, indent=2)
                          }
                      ]
                  }
              ],
              "generationConfig": {
                  "temperature": 0.1,
                  "responseMimeType": "application/json"
              }
          }

          with open("gemini-request.json", "w", encoding="utf-8") as f:
              json.dump(req, f)
          PY

          curl -sS \
            -X POST \
            -H "Content-Type: application/json" \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}" \
            -d @gemini-request.json > gemini-response.json

          jq -r '.candidates[0].content.parts[0].text' gemini-response.json > triage.json

      - name: Apply labels
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        shell: bash
        run: |
          LABELS=$(jq -r '.labels | map(select(length > 0)) | join(",")' triage.json)
          if [ -n "$LABELS" ] && [ "$LABELS" != "null" ]; then
            gh issue edit "$ISSUE_NUMBER" --repo "$REPO" --add-label "$LABELS"
          fi

      - name: Post triage comment
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        shell: bash
        run: |
          COMMENT=$(jq -r '.comment_body' triage.json)
          if [ -n "$COMMENT" ] && [ "$COMMENT" != "null" ]; then
            gh issue comment "$ISSUE_NUMBER" --repo "$REPO" --body "$COMMENT"
          fi
